version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Wait at least 3 days after a new version is published before opening a
    # PR for it — gives the ecosystem time to catch a compromised/malicious
    # release before it lands here.
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3
    open-pull-requests-limit: 5
